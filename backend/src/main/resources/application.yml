server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: apd-dialysis-center
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:dialysisdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

apd:
  hardware:
    canopen:
      port: 60000
      buffer-size: 1024
      read-timeout: 5000
    sensor:
      sample-interval-ms: 100
      filter-window-size: 9
    simulator:
      enabled: true
      patient-movement-noise: true
  websocket:
    heartbeat-interval-ms: 10000
    max-clients: 100
  buffer:
    queue-capacity: 10000
    flush-interval-ms: 50

logging:
  level:
    com.apd.dialysis: DEBUG
    org.springframework.web.socket: INFO
